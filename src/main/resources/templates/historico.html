<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Histórico de Rotas - Rota IA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-voltar:hover {
            background-color: #2980b9;
        }

        .aviso-vazio {
            margin-top: 20px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">

            <a th:href="@{/mapa}" class="btn-voltar" style="margin: 0;">← Voltar para o Mapa</a>

            <div style="display: flex; gap: 10px; align-items: center;">
                <a th:href="@{/api/rotas/exportar}" class="btn-voltar" style="background-color: #27ae60; margin: 0;">⬇️
                    Exportar (.json)</a>

                <form th:action="@{/api/rotas/importar}" method="post" enctype="multipart/form-data"
                    style="display: flex; gap: 5px; align-items: center; background: #ecf0f1; padding: 5px 10px; border-radius: 4px;">
                    <input type="file" name="file" accept=".json" required style="font-size: 14px;">
                    <button type="submit" class="btn-voltar"
                        style="background-color: #f39c12; margin: 0; border: none; cursor: pointer;">⬆️
                        Importar</button>
                </form>
            </div>

        </div>
        <h2>Seu Histórico de Rotas Otimizadas</h2>

        <div th:if="${#lists.isEmpty(rotas)}" class="aviso-vazio">
            Você ainda não possui nenhuma rota salva no seu histórico.
        </div>

        <table th:if="${not #lists.isEmpty(rotas)}">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Origem</th>
                    <th>Paradas Otimizadas</th>
                    <th>Distância</th>
                    <th>Tempo Estimado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rota : ${rotas}">
                    <td th:text="${#temporals.format(rota.dataCriacao, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                    <td th:text="${rota.origem}">Origem</td>
                    <td th:text="${rota.paradas}">Paradas</td>
                    <td th:text="${rota.distanciaTotal}">-- km</td>
                    <td th:text="${rota.tempoTotal}">-- min</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
