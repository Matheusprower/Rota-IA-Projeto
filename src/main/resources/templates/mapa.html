<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Rota IA - Planejamento</title>
    <link rel="stylesheet" th:href="@{/css/mapa.css}">
</head>

<body>
    <div id="main-container">

        <div id="sidebar">

            <div class="header">
                <h2>🚗 Rota IA</h2>
                <p>Planeje e otimize seus trajetos</p>
            </div>

            <div id="container-pontos">
                <div class="form-group">
                    <label>Ponto 1 (Origem)</label>
                    <input type="text" class="input-endereco" placeholder="Digite o endereço inicial">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-add" onclick="adicionarNovoCampo()">➕ Adicionar</button>
                <button class="btn-opt" onclick="tracarRota()">🚀 Otimizar</button>
            </div>

            <div id="resultado"></div>
        </div>

        <div id="map-container"></div>
    </div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        let contadorPontos = 1;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();

            const centro = { lat: -19.9167, lng: -43.9333 };

            map = new google.maps.Map(document.getElementById("map-container"), {
                zoom: 13,
                center: centro,
                mapId: "DEMO_MAP_ID"
            });

            directionsRenderer.setMap(map);
            console.log("Sistema: Mapa carregado com sucesso!");
        }

        function adicionarNovoCampo() {

    contadorPontos++;

    const container = document.getElementById("container-pontos");

    const labels = container.querySelectorAll("label");

    labels.forEach(label => {
        label.textContent = label.textContent.replace(" (Destino)", "");
    });

    const div = document.createElement("div");
    div.className = "form-group";

    div.innerHTML = `
        <label>Ponto ${contadorPontos} (Destino)</label>
        <input 
            type="text" 
            class="input-endereco" 
            placeholder="Digite o endereço"
        >
    `;

    container.appendChild(div);
}

        function tracarRota() {
            const inputs = document.getElementsByClassName("input-endereco");
            const enderecos = [];

            for (let input of inputs) {
                if (input.value.trim() !== "") {
                    enderecos.push(input.value.trim());
                }
            }

            if (enderecos.length < 2) {
                alert("Digite pelo menos dois pontos!");
                return;
            }
            
            const origem = enderecos[0];
            const destino = enderecos[enderecos.length - 1];

            const waypoints = enderecos.slice(1, -1).map(loc => ({
                location: loc,
                stopover: true
            }));

            const request = {
                origin: origem,
                destination: destino,
                waypoints: waypoints,
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode.DRIVING
            };

            directionsService.route(request, (result, status) => {
                if (status === "OK") {

                    directionsRenderer.setDirections(result);

                    let totalDistancia = 0;
                    let totalTempo = 0;

                    result.routes[0].legs.forEach(leg => {
                        totalDistancia += leg.distance.value;
                        totalTempo += leg.duration.value;
                    });

                    document.getElementById("resultado").innerHTML = `
                        <p><strong>Distância total:</strong> ${(totalDistancia / 1000).toFixed(2)} km</p>
                        <p><strong>Tempo estimado:</strong> ${(totalTempo / 60).toFixed(0)} min</p>
                    `;

                } else {
                    alert("Erro: " + status);
                }
            });
        }
    </script>

    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemICGQUKCOgmkICqmwjAa5hd8vBUqaxg&callback=initMap&v=weekly"
        async defer></script>

</body>
</html>
