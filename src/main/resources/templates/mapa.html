<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Rota IA - Planejamento</title>
    <link rel="stylesheet" th:href="@{/css/mapa.css}">
</head>

<body>
    <div id="main-container">

        <div id="sidebar">

            <div class="header">
                <h2>🚗 Rota IA</h2>
                <p>Planeje e otimize seus trajetos</p>
            </div>

            <div id="container-pontos">
                <div class="form-group">
                    <label>Ponto 1 (Origem)</label>
                    <input type="text" class="input-endereco" placeholder="Digite o endereço inicial">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-add" onclick="adicionarNovoCampo()">➕ Adicionar</button>
                <button class="btn-opt" onclick="tracarRota()">🚀 Otimizar</button>
            </div>

            <div id="resultado"></div>

            <div id="resumo-rota"
                style="margin-top: 20px; padding: 15px; background: #34495e; border-radius: 4px; display: none;">
                <h3 style="margin-top: 0; font-size: 18px; color: #3498db; margin-bottom: 10px;">Resumo do Trajeto</h3>
                <p style="margin: 5px 0;">Distância Total: <span id="distancia-total"
                        style="font-weight: bold; color: #27ae60;">--</span></p>
                <p style="margin: 5px 0;">Tempo Estimado: <span id="tempo-total"
                        style="font-weight: bold; color: #27ae60;">--</span></p>
            </div>

            <a th:href="@{/historico}"
                style="align-self: center; margin-top: 20px; padding: 10px 20px; background-color: white; color: #2c3e50; text-decoration: none; font-weight: bold; font-size: 14px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                📊 Ver Meu Histórico de Rotas
            </a>

        </div>
        <div id="map-container" style="width: 100%; height: 100%; min-height: 500px;"></div>

    </div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        let contadorPontos = 1;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();

            const centro = { lat: -19.9167, lng: -43.9333 };

            map = new google.maps.Map(document.getElementById("map-container"), {
                zoom: 13,
                center: centro,
                mapId: "DEMO_MAP_ID"
            });

            directionsRenderer.setMap(map);
            console.log("Sistema: Mapa carregado com sucesso!");
            atualizarLabels()
        }

        function adicionarNovoCampo() {

            contadorPontos++;

            const container = document.getElementById("container-pontos");

            const labels = container.querySelectorAll("label");

            labels.forEach(label => {
                label.textContent = label.textContent.replace(" (Destino)", "");
            });

            const div = document.createElement("div");
            div.className = "form-group";

            div.innerHTML = `
        <label>Ponto ${contadorPontos} (Destino)</label>
        <input 
            type="text" 
            class="input-endereco" 
            placeholder="Digite o endereço"
        >
    `;

            container.appendChild(div);
            atualizarLabels()
        }

        function tracarRota() {
            const inputs = document.getElementsByClassName("input-endereco");
            const enderecos = [];

            // Pega apenas os campos que não estão vazios
            for (let input of inputs) {
                if (input.value.trim() !== "") {
                    enderecos.push(input.value.trim());
                }
            }

            if (enderecos.length < 2) {
                alert("Digite pelo menos a origem e uma parada!");
                return;
            }

            // 1. A NOVA LÓGICA DE PONTOS
            const origem = enderecos[0];
            const destino = enderecos[enderecos.length - 1]; // O último campo é o destino final

            // As paradas são todos os endereços do MEIO (exclui o primeiro e o último)
            const paradas = enderecos.slice(1, enderecos.length - 1);

            const waypoints = paradas.map(loc => ({
                location: loc,
                stopover: true
            }));

            // 2. PEDIDO LIMPO PARA O GOOGLE
            const request = {
                origin: origem,
                destination: destino, // Agora o destino é real!
                waypoints: waypoints,
                optimizeWaypoints: true, // A IA agora funciona livremente
                travelMode: google.maps.TravelMode.DRIVING,
                unitSystem: google.maps.UnitSystem.METRIC
            };

            directionsService.route(request, (result, status) => {
                if (status === "OK") {

                    // Desenha a linha no mapa
                    directionsRenderer.setDirections(result);

                    // 1. Calcula a distância e o tempo totais
                    let totalDistancia = 0;
                    let totalTempo = 0;
                    const pernas = result.routes[0].legs;

                    pernas.forEach(leg => {
                        totalDistancia += leg.distance.value; // em metros
                        totalTempo += leg.duration.value;     // em segundos
                    });

                    // Converte os valores para KM e Minutos
                    const km = (totalDistancia / 1000).toFixed(1) + " km";
                    const min = Math.round(totalTempo / 60) + " min";

                    // 2. EM VEZ DE ALERT, FIXA OS DADOS NA TELA:
                    document.getElementById("distancia-total").innerText = km;
                    document.getElementById("tempo-total").innerText = min;

                    // Faz a caixinha cinza aparecer na barra lateral
                    document.getElementById("resumo-rota").style.display = "block";

                    const dadosParaSalvar = {
                        origem: origem,
                        paradas: paradas.join(" ➔ "), // Junta as paradas com uma setinha
                        distanciaTotal: km,
                        tempoTotal: min
                    };
                    fetch('/api/rotas/salvar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dadosParaSalvar)
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === "sucesso") {
                                console.log("Rota gravada no histórico!");
                            }
                        })
                        .catch(error => console.error("Erro ao salvar:", error));

                } else {
                    alert("Erro na API: " + status + ". Verifique se os endereços existem.");
                }
            });
        }

        function atualizarLabels() {
            const labels = document.querySelectorAll("#container-pontos label");

            labels.forEach((label, index) => {
                if (index === 0) {
                    label.innerText = "Ponto de Partida (Origem)";
                } else if (index === labels.length - 1) {
                    label.innerText = "Destino Final (Fixo)";
                } else {
                    label.innerText = "Parada " + index + " (Otimizável)";
                }
            });
        }
    </script>

    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemICGQUKCOgmkICqmwjAa5hd8vBUqaxg&callback=initMap&v=weekly"
        async defer></script>

</body>

</html>
