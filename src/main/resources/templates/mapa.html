<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Rota IA - Planejamento</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #main-container {
            display: flex;
            height: 100%;
        }

        #sidebar {
            width: 350px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        h2 {
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-add {
            background-color: #3498db;
            color: white;
        }

        .btn-add:hover {
            background-color: #2980b9;
        }

        .btn-opt {
            background-color: #27ae60;
            color: white;
        }

        .btn-opt:hover {
            background-color: #219150;
        }

        #map-container {
            flex: 1;
            background-color: #e9e9e9;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <div id="sidebar">
            <h2>Rota IA: Trajeto</h2>

            <div id="container-pontos">
                <div class="form-group">
                    <label>Ponto 1 (Origem)</label>
                    <input type="text" class="input-endereco" placeholder="Digite o endereço de partida">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-add" onclick="adicionarNovoCampo()">+ Adicionar Parada</button>
                <button class="btn-opt" onclick="tracarRota()">Otimizar Rota</button>
            </div>
        </div>

        <div id="map-container"></div>
    </div>

    <script
        th:src="'https://maps.googleapis.com/maps/api/js?key=COLOQUE_SUA_CHAVE_AQUI=initMap'"
        async defer></script>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        let contadorPontos = 1;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();

            const centro = { lat: -19.9167, lng: -43.9333 }; // BH
            map = new google.maps.Map(document.getElementById("map-container"), {
                zoom: 13,
                center: centro
            });

            directionsRenderer.setMap(map);
        }

        function adicionarNovoCampo() {
            contadorPontos++;
            const container = document.getElementById("container-pontos");
            const novoDiv = document.createElement("div");
            novoDiv.className = "form-group";
            novoDiv.innerHTML = `
                <label>Ponto ${contadorPontos}</label>
                <input type="text" class="input-endereco" placeholder="Próximo destino"/>
            `;
            container.appendChild(novoDiv);
        }

        function tracarRota() {
            const inputs = document.getElementsByClassName("input-endereco");
            const enderecos = [];

            for (let input of inputs) {
                if (input.value.trim() !== "") {
                    enderecos.push(input.value.trim());
                }
            }

            if (enderecos.length < 2) {
                alert("Adicione pelo menos 2 endereços para traçar uma rota!");
                return;
            }

            const origem = enderecos[0];
            const destino = enderecos[enderecos.length - 1];
            const paradas = [];

            // Adiciona pontos intermediários como waypoints
            for (let i = 1; i < enderecos.length - 1; i++) {
                paradas.push({
                    location: enderecos[i],
                    stopover: true
                });
            }

            const request = {
                origin: origem,
                destination: destino,
                waypoints: paradas,
                optimizeWaypoints: true, // Lógica de otimização
                travelMode: google.maps.TravelMode.DRIVING
            };

            directionsService.route(request, (result, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                    const ordemOtimizada = result.routes[0].waypoint_order;
                    console.log("A ordem sugerida pela IA foi:", ordemOtimizada);
                } else {
                    alert("Erro ao traçar rota: " + status + ". Verifique se os endereços estão corretos e se a 'Directions API' está ativa no Google Cloud.");
                }
            });
        }
    </script>
</body>

</html>
