<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Rota IA - Planejamento</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fb;
            color: #2d3436;
        }

        #main-container {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 370px;
            background: linear-gradient(160deg, rgb(11, 11, 11), #3b3279, #564dcf);
            color: #ffffff;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(108, 92, 231, 0.3);
            overflow-y: auto;
        }

        /* HEADER COM LINHA */
        .header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        label {
            font-size: 12px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        input[type="text"] {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #e1e5ea;
            background: #fafbfc;
            font-size: 14px;
            transition: all 0.25s ease;
        }

        input[type="text"]:focus {
            background: #fff;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            outline: none;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-add {
            background: #f1f3f5;
        }

        .btn-add:hover {
            background: #e4e7ea;
        }

        .btn-opt {
            background: linear-gradient(135deg, #6c5ce7, #5a4bd8);
            color: white;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-opt:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-opt:active {
            transform: scale(0.97);
        }

        #resultado {
            margin-top: 25px;
            padding: 15px;
            background: #ffffff;
            border: 1px solid #eaecef;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: #2d3436;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        #resultado strong {
            color: #2c3e50;
        }

        #map-container {
            flex: 1;
        }

        #sidebar::-webkit-scrollbar {
            width: 6px;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: #dcdde1;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            #main-container {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                border-bottom: 1px solid #eaecef;
            }
        }
    </style>
</head>

<body>
    <div id="main-container">

        <div id="sidebar">

            <div class="header">
                <h2>🚗 Rota IA</h2>
                <p>Planeje e otimize seus trajetos</p>
            </div>

            <div id="container-pontos">
                <div class="form-group">
                    <label>Ponto 1 (Origem)</label>
                    <input type="text" class="input-endereco" placeholder="Digite o endereço inicial">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-add" onclick="adicionarNovoCampo()">➕ Adicionar</button>
                <button class="btn-opt" onclick="tracarRota()">🚀 Otimizar</button>
            </div>

            <div id="resultado"></div>
        </div>

        <div id="map-container"></div>
    </div>

    <script>
        let map;
        let directionsService;
        let directionsRenderer;
        let contadorPontos = 1;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();

            const centro = { lat: -19.9167, lng: -43.9333 }; //Belo Horizonte

            map = new google.maps.Map(document.getElementById("map-container"), {
                zoom: 13,
                center: centro,
                mapId: "DEMO_MAP_ID" //Ajuda a evitar alguns erros de carregamento
            });

            directionsRenderer.setMap(map);
            console.log("Sistema: Mapa carregado com sucesso!");
        }

        function adicionarNovoCampo() {
            contadorPontos++;

            const container = document.getElementById("container-pontos");

            const div = document.createElement("div");
            div.className = "form-group";

            div.innerHTML = `
                <label>Ponto ${contadorPontos}</label>
                <input type="text" class="input-endereco" placeholder="Digite o endereço">
            `;

            container.appendChild(div);
        }

        function tracarRota() {
            const inputs = document.getElementsByClassName("input-endereco");
            const enderecos = [];

            for (let input of inputs) {
                if (input.value.trim() !== "") {
                    enderecos.push(input.value.trim());
                }
            }

            if (enderecos.length < 2) {
                alert("Digite pelo menos dois pontos!");
                return;
            }
            
            const origem = enderecos[0];
            const destino = enderecos[enderecos.length - 1];

            // Criamos os waypoints para TODAS as paradas extras
            const waypoints = enderecos.slice(1, -1).map(loc => ({
                location: loc,
                stopover: true
            }));

            const request = {
                origin: origem,
                destination: destino, // Mantemos o truque da origem ser o destino
                waypoints: waypoints,
                optimizeWaypoints: true, // A CHAVE DA IA
                travelMode: google.maps.TravelMode.DRIVING
            };

            directionsService.route(request, (result, status) => {
                if (status === "OK") {

                    directionsRenderer.setDirections(result);

                    let totalDistancia = 0;
                    let totalTempo = 0;

                    result.routes[0].legs.forEach(leg => {
                        totalDistancia += leg.distance.value;
                        totalTempo += leg.duration.value;
                    });

                    document.getElementById("resultado").innerHTML = `
                        <p><strong>Distância total:</strong> ${(totalDistancia / 1000).toFixed(2)} km</p>
                        <p><strong>Tempo estimado:</strong> ${(totalTempo / 60).toFixed(0)} min</p>
                    `;

                } else {
                    alert("Erro: " + status);
                }
            });
        }
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=COLOQUE_SUA_CHAVE_DA_API_AQUI&callback=initMap" async defer></script>

</body>
</html>
